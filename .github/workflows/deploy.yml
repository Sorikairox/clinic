# Deploys the site to Netlify on every push to main.
#
# Required repository secrets (Settings → Secrets and variables → Actions):
#   NETLIFY_AUTH_TOKEN   personal access token from Netlify
#   NETLIFY_SITE_ID      the target Netlify site's API ID
#   DATABASE_URL         Turso libSQL URL (optional; enables auto-migration)
#   DATABASE_AUTH_TOKEN  Turso auth token (with DATABASE_URL)
# Optional repository variable:
#   SITE_URL             public site URL, for canonical/hreflang/sitemap
name: Deploy

on:
  push:
    branches: [main]

concurrency:
  group: deploy-main
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      DATABASE_AUTH_TOKEN: ${{ secrets.DATABASE_AUTH_TOKEN }}
      SITE_URL: ${{ vars.SITE_URL }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      # Applies pending Drizzle migrations to Turso. Skipped if DATABASE_URL
      # isn't configured (e.g. before the database is set up).
      - name: Apply database migrations (Turso)
        if: ${{ env.DATABASE_URL != '' }}
        run: npm run db:migrate

      # `--build` runs the build command from netlify.toml (npm run build, which
      # uses the Netlify adapter) and deploys the SSR functions + assets.
      - name: Build and deploy to Netlify
        run: npx --yes netlify-cli@latest deploy --build --prod
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
