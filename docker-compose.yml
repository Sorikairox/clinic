# Convenience wrapper for the local test database.
#
#   docker compose up -d testdb      # start the libSQL server on :8080
#   docker compose down              # stop it (data persists in the volume)
#   docker compose down -v           # stop and wipe the data
#
# Then point the app at it:
#   DATABASE_URL=http://127.0.0.1:8080 npm run db:migrate
#   DATABASE_URL=http://127.0.0.1:8080 npm run db:seed
#   DATABASE_URL=http://127.0.0.1:8080 npm run dev

services:
  testdb:
    build:
      context: .
      dockerfile: Dockerfile.testdb
    image: shiba-testdb
    ports:
      - "8080:8080"
    volumes:
      - testdb-data:/var/lib/sqld
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/health"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  testdb-data:
