# Netlify build configuration. The @astrojs/netlify adapter wires up the
# serverless functions and publish directory automatically.
[build]
  command = "npm run build"

[build.environment]
  NODE_VERSION = "22"

# Reminder: set SITE_URL, DATABASE_URL, DATABASE_AUTH_TOKEN, SESSION_SECRET,
# RESEND_API_KEY and EMAIL_FROM in the Netlify site environment variables.
